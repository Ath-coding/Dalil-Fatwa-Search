name: Update Fatwas

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ جلب المستودع
      - uses: actions/checkout@v3

      # 2️⃣ إعداد Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3️⃣ تثبيت المكتبات
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml googletrans==4.0.0-rc1

      # 4️⃣ تشغيل سكربت Python
      - name: Run scraper
        run: python script.py

      # 5️⃣ حفظ التغييرات في data.json
      - name: Commit changes
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add data.json
          git commit -m "Update fatwas with translations" || echo "No changes to commit"
          git push
