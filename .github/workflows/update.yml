name: Update Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # خطوة جلب الكود من المستودع
      - uses: actions/checkout@v3

      # خطوة ضبط Python 3.10
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # ترقية pip وتثبيت المكتبات المطلوبة
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # تشغيل سكربت بايثون
      - name: Run script
        run: python script.py

      # خطوة حفظ ورفع التغييرات
      - name: Commit changes
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add data.json
          git commit -m "update data" || echo "no changes"
          git push
